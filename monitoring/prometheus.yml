global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the StatsD exporter which receives metrics from Airflow
  - job_name: 'airflow'
    static_configs:
      - targets: ['statsd-exporter:9102']
    relabel_configs:
      - target_label: instance
        replacement: 'airflow'

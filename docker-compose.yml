services:
  # PostgreSQL backend for Airflow metadata
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow-network

  # Redis for Celery message broker (for future scaling)
  redis:
    image: redis:7-alpine
    container_name: airflow-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-volume:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow-network

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /home/airflow/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-REDACTED_FERNET_KEY}
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "False"
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 300
    volumes:
      - ./dags:/home/airflow/airflow/dags
      - ./plugins:/home/airflow/airflow/plugins
      - ./scripts:/home/airflow/scripts
      - ./logs:/home/airflow/airflow/logs
      - ./.env:/home/airflow/airflow/.env
    networks:
      - airflow-network

  # Airflow Webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /home/airflow/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-REDACTED_FERNET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    volumes:
      - ./dags:/home/airflow/airflow/dags
      - ./plugins:/home/airflow/airflow/plugins
      - ./scripts:/home/airflow/scripts
      - ./logs:/home/airflow/airflow/logs
      - ./.env:/home/airflow/airflow/.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - airflow-network

  # Airflow Init (one-time setup)
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow-init
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-REDACTED_FERNET_KEY}
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "False"
    networks:
      - airflow-network

volumes:
  postgres-volume:
  redis-volume:

networks:
  airflow-network:
    driver: bridge

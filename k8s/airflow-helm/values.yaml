# Airflow Helm Chart Values for Marketing Analytics Platform
# Configured for Kubernetes Executor with production patterns

# Airflow Configuration
airflow:
  # Airflow image — built and pushed by CI to GHCR on every push to main
  # Local Minikube builds still use: eval $(minikube docker-env) && docker build -t airflow-custom:latest .
  image:
    repository: ghcr.io/ftacc41/project4dept
    tag: latest
    pullPolicy: Always

  # Executor: Local for Minikube (KubernetesExecutor requires shared PVC/git-sync)
  executor: LocalExecutor

  # Fernet key sourced from K8s secret 'airflow-fernet-key' (key: fernet-key)
  # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  # Store:    kubectl create secret generic airflow-fernet-key --from-literal=fernet-key=<key> -n airflow-project
  fernetKey: ""  # set via secretKeyRef in deployment template

  # DB connection string (points to in-cluster postgres)
  dbConnection: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"

  # DAGs folder (mounted from host)
  dags:
    persistence:
      enabled: true
      hostPath: /Users/macbook/Desktop/CODING_PROJECTS/airflow_project/dags

  # Logs folder
  logs:
    persistence:
      enabled: true
      hostPath: /Users/macbook/Desktop/CODING_PROJECTS/airflow_project/logs

  # Plugins folder
  plugins:
    persistence:
      enabled: true
      hostPath: /Users/macbook/Desktop/CODING_PROJECTS/airflow_project/plugins

# PostgreSQL Configuration (external for now, can be internal later)
postgresql:
  enabled: true
  database: airflow
  username: airflow
  password: airflow

# Redis Configuration (not needed for LocalExecutor)
redis:
  enabled: false

# Webserver Configuration
webserver:
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Scheduler Configuration
scheduler:
  replicas: 1
  resources:
    requests:
      memory: "768Mi"
      cpu: "250m"
    limits:
      memory: "1536Mi"
      cpu: "500m"

# Worker Configuration (for Kubernetes Executor)
workers:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Triggerer Configuration (optional)
triggerer:
  enabled: false

# DAG Processor Configuration
dagProcessor:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Service Account
serviceAccount:
  create: true
  name: "airflow-sa"
  annotations: {}

# RBAC
rbac:
  create: true

# ConfigMaps for Airflow configuration
config:
  AIRFLOW__CORE__DAGS_FOLDER: "/home/airflow/airflow/dags"
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__PARALLELISM: "16"
  AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "8"
  AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "60"
  AIRFLOW__WEBSERVER__WORKERS: "1"
  AIRFLOW__WEBSERVER__WORKER_TIMEOUT: "300"
  AIRFLOW__METRICS__STATSD_ON: "True"
  AIRFLOW__METRICS__STATSD_HOST: "airflow-statsd-exporter"
  AIRFLOW__METRICS__STATSD_PORT: "8125"
  AIRFLOW__METRICS__STATSD_PREFIX: "airflow"

# Secrets (base64 encoded)
secrets:
  gitSync: {}
  env: []

# Ingress (disabled for local development)
ingress:
  enabled: false

# Monitoring (basic setup)
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true

# Node Selector (optional)
nodeSelector: {}

# Tolerations (optional)
tolerations: []

# Affinity (optional)
affinity: {}
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

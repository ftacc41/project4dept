{{- if .Values.rbac.create }}
# Restrict Postgres to only accept connections from Airflow pods
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "airflow-helm.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airflow-helm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "airflow-helm.fullname" . }}-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "airflow-helm.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432

# Restrict StatsD exporter to only accept metrics from Airflow pods
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "airflow-helm.fullname" . }}-statsd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airflow-helm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "airflow-helm.fullname" . }}-statsd-exporter
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "airflow-helm.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: UDP
          port: 8125
        - protocol: TCP
          port: 9102

# Airflow pods: allow all egress (required for BigQuery/GCP API calls)
# and only accept ingress on the webserver port from within the cluster
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "airflow-helm.fullname" . }}-airflow
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airflow-helm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "airflow-helm.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow webserver traffic from within the cluster (port-forward, ingress controller)
    - ports:
        - protocol: TCP
          port: {{ .Values.webserver.service.port }}
  egress:
    # Allow all egress: Postgres, StatsD, BigQuery API, DNS
    - {}
{{- end }}
